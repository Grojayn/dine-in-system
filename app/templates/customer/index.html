{% extends "base.html" %}
{% block title %}堂食点餐系统{% endblock %}
{% block content %}
<div class="hero-section rounded-3 mb-5 text-center">
    <h1 class="display-4 fw-bold">欢迎光临</h1>
    <p class="lead">请选择您的桌位开始点餐</p>
</div>
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h4 class="card-title text-center mb-4">输入桌号</h4>
                {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
                {% endif %}
                <form method="post" action="{{ url_for('customer.select_table') }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                    <div class="mb-3">
                        <label class="form-label">桌号</label>
                        <input type="text" name="table_number" class="form-control form-control-lg" placeholder="例如: A01" required autofocus>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100">进入菜单</button>
                </form>
            </div>
        </div>
    </div>
</div>
<div class="row mt-5 text-center">
    <div class="col-md-4"><div class="feature-icon">&#x1FA91;</div><h5>选择桌位</h5><p class="text-muted">输入您的桌号入座</p></div>
    <div class="col-md-4"><div class="feature-icon">&#x1F4CB;</div><h5>浏览菜单</h5><p class="text-muted">查看菜品并下单</p></div>
    <div class="col-md-4"><div class="feature-icon">&#x1F935;</div><h5>等待上菜</h5><p class="text-muted">后厨接单后为您制作</p></div>
</div>
{% endblock %}
