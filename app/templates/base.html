<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}堂食点餐系统{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('customer.index') }}">堂食点餐系统</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="{{ url_for('customer.index') }}">顾客入口</a>
                <a class="nav-link" href="{{ url_for('admin.dashboard') }}">管理面板</a>
                {% if session.get('admin_logged_in') %}
                    <a class="nav-link" href="{{ url_for('admin.logout') }}">退出</a>
                {% endif %}
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>
    <script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>
    {% block scripts %}{% endblock %}
    {% block assistant_widget %}{% endblock %}
    {% if session.get('admin_logged_in') %}
    {% include "admin/kitchen_widget.html" %}
    <script src="{{ url_for('static', filename='js/kitchen.js') }}"></script>
    {% endif %}
</body>
</html>
